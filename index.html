let currentTab = "todos";
let currentItem = null;

function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  renderCards();
}

function getTagClass(type) {
  return { objection: "tag-objection", followup: "tag-followup", dor: "tag-dor", fechamento: "tag-fechamento" }[type] || "tag-objection";
}

function getTagLabel(type) {
  return { objection: "Objeção", followup: "Follow-up", dor: "Dor do cliente", fechamento: "Fechamento" }[type] || type;
}

function renderCards() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  let filtered = data;
  if (currentTab !== "todos") filtered = filtered.filter(d => d.type === currentTab);
  if (q) filtered = filtered.filter(d =>
    d.title.toLowerCase().includes(q) ||
    d.preview.toLowerCase().includes(q) ||
    d.tag.toLowerCase().includes(q) ||
    d.script.toLowerCase().includes(q)
  );

  document.getElementById("count-badge").textContent = filtered.length + " resultado" + (filtered.length !== 1 ? "s" : "");

  const container = document.getElementById("cards-container");
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty"><span>🔍</span>Nenhum resultado encontrado.<br>Tente outra palavra-chave.</div>';
    return;
  }

  container.innerHTML = filtered.map(item => `
    <div class="card" onclick="openModal(${item.id})">
      <div class="card-header">
        <div class="card-title">${item.title}</div>
        <span class="card-tag ${getTagClass(item.type)}">${item.tag}</span>
      </div>
      <div class="card-preview">${item.preview}</div>
    </div>
  `).join("");
}

function openModal(id) {
  currentItem = data.find(d => d.id === id);

  document.getElementById("modal-title").textContent = currentItem.title;

  const tag = document.getElementById("modal-tag");
  tag.textContent = getTagLabel(currentItem.type);
  tag.className = "modal-tag " + getTagClass(currentItem.type);

  const whenEl = document.getElementById("modal-when");
  if (currentItem.when) {
    whenEl.textContent = currentItem.when;
    whenEl.style.display = "block";
  } else {
    whenEl.style.display = "none";
  }

  document.getElementById("modal-body").textContent = currentItem.script;

  const whyEl = document.getElementById("modal-why");
  if (currentItem.why) {
    whyEl.textContent = "Por que funciona: " + currentItem.why;
    whyEl.style.display = "block";
  } else {
    whyEl.style.display = "none";
  }

  const rulesEl = document.getElementById("modal-rules");
  if (currentItem.rules) {
    rulesEl.innerHTML = "<strong>Regras de uso</strong>" + currentItem.rules.replace(/\n/g, "<br>");
    rulesEl.style.display = "block";
  } else {
    rulesEl.style.display = "none";
  }

  const tipEl = document.getElementById("modal-tip");
  tipEl.style.display = currentItem.type === "followup" ? "none" : "block";

  const btn = document.getElementById("copy-btn");
  btn.textContent = "Copiar script";
  btn.classList.remove("copied");

  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModalOutside(e) {
  if (e.target === document.getElementById("modal")) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
}

function copyScript() {
  if (!currentItem) return;
  navigator.clipboard.writeText(currentItem.script).then(() => {
    const btn = document.getElementById("copy-btn");
    btn.textContent = "Copiado!";
    btn.classList.add("copied");
    setTimeout(() => {
      btn.textContent = "Copiar script";
      btn.classList.remove("copied");
    }, 2500);
  }).catch(() => {
    const ta = document.createElement("textarea");
    ta.value = currentItem.script;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    document.getElementById("copy-btn").textContent = "Copiado!";
    setTimeout(() => { document.getElementById("copy-btn").textContent = "Copiar script"; }, 2500);
  });
}

renderCards();
</script>
